<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap LTR -->
    <link
      id="bootstrap-ltr"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- Bootstrap RTL (disabled by default) -->
    <link
      id="bootstrap-rtl"
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      disabled
    />

    <!--Bootstrap Icons-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <button
      id="themeToggle"
      class="theme-toggle"
      type="button"
      aria-label="Toggle light and dark mode"
    >
      🌙
    </button>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img
          src="img/loreal-logo-png-transparent.png"
          alt="L'Oréal Logo"
          class="logo"
        />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
      </header>

      <!-- Category Filter -->
      <div class="search-section">
        <fieldset id="categoryFilter" class="category-options">
          <legend>Select one or more categories</legend>
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="cleanser"
            />
            Cleansers</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="moisturizer"
            />
            Moisturizers & Treatments</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="haircare"
            />
            Haircare</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="makeup"
            />
            Makeup</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="hair color"
            />
            Hair Color</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="hair styling"
            />
            Hair Styling</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="men's grooming"
            />
            Men's Grooming</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="suncare"
            />
            Suncare</label
          >
          <label
            ><input
              type="checkbox"
              name="categoryFilterOption"
              value="fragrance"
            />
            Fragrance</label
          >
        </fieldset>
      </div>
      <div class="product-search-bar">
        <label for="productKeywordSearch"
          >Search products by name or keyword</label
        >
        <input
          id="productKeywordSearch"
          name="productKeywordSearch"
          type="search"
          placeholder="Example: serum, mascara, dry skin"
          autocomplete="off"
        />
      </div>
      <p class="filter-hint">Select all categories you want to browse.</p>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div class="selected-products">
        <h2>Selected Products</h2>
        <div id="selectedProductsList"></div>
        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
        <button id="clearSelection" class="clear-selection-btn">
          <i class="fa-solid fa-trash"></i> Clear Selection
        </button>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window"></div>
        <div class="ai-search-controls">
          <label for="useCurrentInfo">
            <input id="useCurrentInfo" type="checkbox" /> Include current info
            mode (request links and citations)
          </label>
        </div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- Google Translate element for RTL language support -->
    <div id="google_translate_element"></div>
    <script>
      // Initialize Google Translate with RTL language support
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "en,fr,es,de,it,zh-CN,ja,ar,ko,ru",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          },
          "google_translate_element",
        );
      }

      // Monitor and update page direction based on language changes
      const observer = new MutationObserver(() => {
        const htmlElement = document.documentElement;
        const currentLang = (htmlElement.getAttribute("lang") || "en").split(
          "-",
        )[0];

        // RTL languages: Arabic (ar), Hebrew (he)
        const rtlLanguages = ["ar", "he"];
        const isRTL = rtlLanguages.includes(currentLang);

        // Update HTML dir attribute
        htmlElement.setAttribute("dir", isRTL ? "rtl" : "ltr");

        // Toggle Bootstrap RTL stylesheet
        const bootstrapLtr = document.getElementById("bootstrap-ltr");
        const bootstrapRtl = document.getElementById("bootstrap-rtl");

        if (isRTL) {
          if (bootstrapLtr) bootstrapLtr.disabled = true;
          if (bootstrapRtl) bootstrapRtl.disabled = false;
        } else {
          if (bootstrapLtr) bootstrapLtr.disabled = false;
          if (bootstrapRtl) bootstrapRtl.disabled = true;
        }

        window.dispatchEvent(
          new CustomEvent("app-language-changed", {
            detail: {
              lang: currentLang,
              isRTL,
            },
          }),
        );
      });

      // Start observing language changes
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["lang"],
      });
    </script>
    <style>
      /* Position the Google Translate widget - responsive to text direction */
      #google_translate_element {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9999;
        background: white;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-family: Arial, sans-serif;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      /* In RTL mode, reposition to the left */
      html[dir="rtl"] #google_translate_element {
        left: auto;
        right: 10px;
      }

      /* Theme toggle button responsive to text direction */
      html[dir="rtl"] .theme-toggle {
        right: auto;
        left: 20px;
      }

      /* Adjust page wrapper padding for RTL */
      html[dir="rtl"] .page-wrapper {
        direction: rtl;
      }

      /* Message alignment adjustments for RTL */
      html[dir="rtl"] .msg.user {
        flex-direction: row;
      }

      html[dir="rtl"] .msg.user .msg-body {
        align-items: flex-start;
      }

      html[dir="rtl"] .msg.ai {
        flex-direction: row-reverse;
      }

      /* Adjust form button position for RTL */
      html[dir="rtl"] .chat-form {
        flex-direction: row-reverse;
      }

      /* Adjust logo and header for RTL */
      html[dir="rtl"] .site-header {
        direction: rtl;
      }

      /* Ensure text input remains LTR while form is RTL */
      html[dir="rtl"] .chat-form input {
        direction: ltr;
        text-align: left;
      }
    </style>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
